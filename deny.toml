# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[licenses]
# 配布時に attribution を含めれば再配布可能な permissive ライセンス群。
# OR 結合の場合は cargo-deny がこのリストから選択可能なものを採用する。
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Zlib",
    "ISC",
    "0BSD",
    "BSL-1.0",
    "CC0-1.0",
    "Unlicense",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
    "MPL-2.0", # weak copyleft（ファイル単位での開示義務のみ、リンクは permissive 扱い）
]
confidence-threshold = 0.8
# 未使用の許可ライセンスを警告しない（将来のアプリ配布で必要になる superset を維持するため）
unused-allowed-license = "allow"

[advisories]
# 既知の未解決 advisory を許容するリスト。
ignore = [
    # paste 1.0.15: unmaintained 宣言。wgpu-hal → metal 経由の上流依存で、
    # 自プロジェクトからは外せない。wgpu 側で metal が更新されるまで待つ。
    "RUSTSEC-2024-0436",
]

[bans]
# 同一クレートの複数バージョン共存は依存ツリー上ほぼ不可避なので緩める。
multiple-versions = "allow"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "allow" # git 依存（seimei/murakumo 等）を許可
