# cargo-about configuration
# https://embarkstudios.github.io/cargo-about/
#
# Generates THIRD-PARTY-LICENSES.html bundling all dependency license texts.
# Usage:
#   cargo about generate about.hbs -o THIRD-PARTY-LICENSES.html

# 同梱する attribution テキストを生成する対象ライセンス。
# deny.toml の allow リストと同じ superset を維持する。
accepted = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Zlib",
    "ISC",
    "0BSD",
    "BSL-1.0",
    "CC0-1.0",
    "Unlicense",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
    "MPL-2.0",
]

# 不明・NOASSERTION ライセンスを除外せず attribution に含める。
filter-noassertion = true

# workspace 自身のクレート（path 依存等）は attribution の対象外。
# 注意: ignore = true にすると git 依存（seimei, sabitori 等の自リポジトリ）
# も除外されてしまうため false（デフォルト）にする。
[private]
ignore = false
